<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERNET.COM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111;
    --fg: #eee;
    --dim: #666;
    --line: #333;
  }

  body.light {
    --bg: #fff;
    --fg: #111;
    --dim: #999;
    --line: #ddd;
  }

  body {
    font-family: monospace;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    line-height: 1.6;
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 16px 64px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 14px;
    font-weight: normal;
    letter-spacing: 0.05em;
  }

  #theme-toggle {
    background: none;
    border: none;
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .prompt { color: var(--dim); }

  #search {
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    outline: none;
    width: 100%;
    padding: 2px 0;
  }

  #search::placeholder { color: var(--dim); }

  #bookmark-list {
    list-style: none;
  }

  .bookmark-item {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 3px 0;
    cursor: pointer;
    border-bottom: 1px solid transparent;
  }

  .bookmark-item:hover {
    border-bottom-color: var(--line);
  }

  .item-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .item-url { color: var(--dim); }
  .item-sep { color: var(--dim); margin: 0 6px; }
  .item-title { color: var(--fg); }
  .item-desc { color: var(--dim); }

  .item-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .bookmark-item:hover .item-actions { opacity: 1; }

  .item-actions button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }

  .item-actions button:hover { color: var(--fg); }

  #add-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 3px 0;
    margin-top: 4px;
    display: block;
  }

  #add-btn:hover { color: var(--fg); }

  .inline-form {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid var(--line);
  }

  .inline-form input {
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    outline: none;
    padding: 1px 0;
  }

  .inline-form .f-url { width: 140px; }
  .inline-form .f-title { width: 120px; }
  .inline-form .f-desc { flex: 1; }

  .inline-form button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    white-space: nowrap;
  }

  .inline-form button:hover { color: var(--fg); }

  .empty { color: var(--dim); padding: 6px 0; }
</style>
</head>
<body>

<header>
  <h1>INTERNET.COM</h1>
  <button id="theme-toggle">●</button>
</header>

<div class="search-bar">
  <span class="prompt">&gt;</span>
  <input type="text" id="search" placeholder="search...">
</div>

<ul id="bookmark-list"></ul>
<button id="add-btn">+</button>

<script>
const DEFAULTS = [
  { id: 1, url: 'github.com', title: 'GitHub', desc: 'Code hosting' },
  { id: 2, url: 'mdn.dev', title: 'MDN Web Docs', desc: 'Web reference' },
  { id: 3, url: 'lobste.rs', title: 'Lobsters', desc: 'Tech news' },
];

let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || 'null') ?? DEFAULTS;
let query = '';

const save = () => localStorage.setItem('bookmarks', JSON.stringify(bookmarks));

const list = document.getElementById('bookmark-list');
const search = document.getElementById('search');
const addBtn = document.getElementById('add-btn');

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function href(url) {
  return url.startsWith('http') ? url : 'https://' + url;
}

function render() {
  const q = query.toLowerCase();
  const filtered = bookmarks.filter(b =>
    !q || [b.url, b.title, b.desc].some(v => v.toLowerCase().includes(q))
  );

  list.innerHTML = '';

  if (!filtered.length) {
    const li = document.createElement('li');
    li.className = 'empty';
    li.textContent = 'aucun résultat';
    list.appendChild(li);
    return;
  }

  filtered.forEach(b => {
    const li = document.createElement('li');
    li.className = 'bookmark-item';
    li.innerHTML = `
      <span class="item-text">
        <span class="item-url">${esc(b.url)}</span>
        <span class="item-sep">—</span>
        <span class="item-title">${esc(b.title)}</span>
        <span class="item-sep">—</span>
        <span class="item-desc">${esc(b.desc)}</span>
      </span>
      <span class="item-actions">
        <button class="btn-edit" data-id="${b.id}">[e]</button>
        <button class="btn-del" data-id="${b.id}">[x]</button>
      </span>
    `;
    li.querySelector('.item-text').onclick = () => window.open(href(b.url), '_blank');
    li.querySelector('.btn-edit').onclick = e => { e.stopPropagation(); startEdit(b.id, li); };
    li.querySelector('.btn-del').onclick = e => { e.stopPropagation(); deleteBM(b.id); };
    list.appendChild(li);
  });
}

function startEdit(id, li) {
  const b = bookmarks.find(x => x.id === id);
  if (!b) return;

  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input class="f-url" value="${esc(b.url)}" placeholder="url">
    <input class="f-title" value="${esc(b.title)}" placeholder="titre">
    <input class="f-desc" value="${esc(b.desc)}" placeholder="description">
    <button class="save-edit">[ok]</button>
    <button class="cancel-edit">[annuler]</button>
  `;

  form.querySelector('.save-edit').onclick = () => {
    b.url = form.querySelector('.f-url').value.trim();
    b.title = form.querySelector('.f-title').value.trim();
    b.desc = form.querySelector('.f-desc').value.trim();
    if (!b.url) return;
    save(); render();
  };

  form.querySelector('.cancel-edit').onclick = () => render();

  li.replaceWith(form);
  form.querySelector('.f-url').focus();
}

function deleteBM(id) {
  bookmarks = bookmarks.filter(b => b.id !== id);
  save(); render();
}

addBtn.onclick = () => {
  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input class="f-url" placeholder="url">
    <input class="f-title" placeholder="titre">
    <input class="f-desc" placeholder="description">
    <button class="save-add">[ok]</button>
    <button class="cancel-add">[annuler]</button>
  `;

  form.querySelector('.save-add').onclick = () => {
    const url = form.querySelector('.f-url').value.trim();
    const title = form.querySelector('.f-title').value.trim();
    const desc = form.querySelector('.f-desc').value.trim();
    if (!url) { form.querySelector('.f-url').focus(); return; }
    bookmarks.push({ id: Date.now(), url, title: title || url, desc });
    save(); render();
  };

  form.querySelector('.cancel-add').onclick = () => form.remove();

  addBtn.before(form);
  form.querySelector('.f-url').focus();
};

search.oninput = () => { query = search.value; render(); };

// Theme
const toggle = document.getElementById('theme-toggle');
const applyTheme = t => { document.body.classList.toggle('light', t === 'light'); };
applyTheme(localStorage.getItem('theme') || 'dark');
toggle.onclick = () => {
  const t = document.body.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('theme', t);
  applyTheme(t);
};

render();
</script>
</body>
</html>
