<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERNET.COM</title>
<link rel="icon" id="favicon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48Y2lyY2xlIGN4PSc1MCcgY3k9JzUwJyByPSc0MCcgZmlsbD0nbm9uZScgc3Ryb2tlPScjMDAwJyBzdHJva2Utd2lkdGg9JzEwJy8+PC9zdmc+">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { user-select: none; }
  ::selection { background: transparent; }

  :root {
    --bg: #111;
    --fg: #eee;
    --dim: #666;
    --line: #333;
  }

  body.light {
    --bg: #fff;
    --fg: #111;
    --dim: #999;
    --line: #ddd;
  }

  body {
    font-family: monospace;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    line-height: 1.6;
    width: 480px;
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 14px;
    font-weight: normal;
    letter-spacing: 0.05em;
  }

  #theme-toggle, #sort-btn {
    background: none;
    border: none;
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    width: 14px;
    height: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  #sort-btn { transition: transform 0.2s; font-size: 20px; }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .prompt { color: var(--dim); }

  #search {
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    outline: none;
    width: 100%;
    padding: 2px 0;
  }

  #search::placeholder { color: var(--dim); }

  #tag-filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    min-height: 0;
  }

  .tag-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }

  .tag-btn:hover, .tag-btn.active { color: var(--fg); }

  #bookmark-list {
    list-style: none;
    user-select: none;
  }

  .bookmark-item {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 3px 0;
    cursor: default;
    border-bottom: 1px solid transparent;
  }

  .bookmark-item:hover { border-bottom-color: var(--line); }

  .item-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .item-url {
    color: var(--dim);
    cursor: pointer;
  }

  .item-url:hover { color: var(--fg); }

  .item-tag {
    color: var(--dim);
    margin-left: 10px;
    font-size: 12px;
  }

  .item-actions {
    display: flex;
    gap: 14px;
    opacity: 0;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .bookmark-item:hover .item-actions { opacity: 1; }

  .item-actions button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }

  .item-actions button:hover { color: var(--fg); }

  @keyframes flash {
    0%, 100% { color: var(--dim); }
    40% { color: var(--fg); }
  }

  .bookmark-item.flash .item-url { animation: flash 0.6s ease; }

  @keyframes spin-cw {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .btn-copy.copied {
    animation: spin-cw 0.4s ease;
    color: var(--fg);
  }

  #add-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 3px 0;
    margin-top: 4px;
    display: block;
  }

  #add-btn:hover { color: var(--fg); }

  .inline-form {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid var(--line);
  }

  .inline-form input {
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    outline: none;
    padding: 1px 0;
  }

  .inline-form .f-url { flex: 1; }
  .inline-form .f-tag { width: 80px; }

  .inline-form button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    white-space: nowrap;
  }

  .inline-form button:hover { color: var(--fg); }

  .empty { color: var(--dim); padding: 6px 0; }

  .bookmark-item.selected .item-url { color: var(--fg); }
  .bookmark-item.selected { background: var(--line); }

  #drag-rect {
    position: fixed;
    border: 1px solid var(--dim);
    background: rgba(150,150,150,0.08);
    pointer-events: none;
    display: none;
    z-index: 999;
  }

  .fetching { opacity: 0.4; }
</style>
</head>
<body>

<header>
  <h1>INTERNET.COM</h1>
  <div style="display:flex;gap:1rem;align-items:center">
    <button id="sort-btn">›</button>
    <button id="theme-toggle">●</button>
  </div>
</header>

<div class="search-bar">
  <span class="prompt">&gt;</span>
  <input type="text" id="search" placeholder="search..." autocomplete="new-password" name="search-field">
</div>

<div id="tag-filters"></div>

<ul id="bookmark-list"></ul>
<button id="add-btn">+</button>
<div id="drag-rect"></div>

<script src="app.js"></script>
</body>
</html>
