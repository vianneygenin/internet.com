<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERNET.COM</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48c3R5bGU+Y2lyY2xle3N0cm9rZTojMDAwfUBtZWRpYShwcmVmZXJzLWNvbG9yLXNjaGVtZTpkYXJrKXtjaXJjbGV7c3Ryb2tlOiNmZmZ9fTwvc3R5bGU+PGNpcmNsZSBjeD0nNTAnIGN5PSc1MCcgcj0nNDAnIGZpbGw9J25vbmUnIHN0cm9rZS13aWR0aD0nMTAnLz48L3N2Zz4=">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { user-select: none; }
  ::selection { background: transparent; }

  :root {
    --bg: #111;
    --fg: #eee;
    --dim: #666;
    --line: #333;
  }

  body.light {
    --bg: #fff;
    --fg: #111;
    --dim: #999;
    --line: #ddd;
  }

  body {
    font-family: monospace;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    line-height: 1.6;
    max-width: 640px;
    margin: 0 auto;
    padding: 192px 16px 64px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 14px;
    font-weight: normal;
    letter-spacing: 0.05em;
  }

  #theme-toggle {
    background: none;
    border: none;
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .prompt { color: var(--dim); }

  #search {
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    outline: none;
    width: 100%;
    padding: 2px 0;
  }

  #search::placeholder { color: var(--dim); }

  #tag-filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    min-height: 0;
  }

  .tag-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }

  .tag-btn:hover, .tag-btn.active { color: var(--fg); }

  #bookmark-list {
    list-style: none;
    user-select: none;
  }

  .bookmark-item {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 3px 0;
    cursor: default;
    border-bottom: 1px solid transparent;
  }

  .bookmark-item:hover { border-bottom-color: var(--line); }

  .item-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .item-url {
    color: var(--dim);
    cursor: pointer;
  }

  .item-url:hover { color: var(--fg); }

  .item-tag {
    color: var(--dim);
    margin-left: 10px;
    font-size: 12px;
  }

  .item-actions {
    display: flex;
    gap: 14px;
    opacity: 0;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .bookmark-item:hover .item-actions { opacity: 1; }

  .item-actions button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }

  .item-actions button:hover { color: var(--fg); }

  @keyframes flash {
    0%, 100% { color: var(--dim); }
    40% { color: var(--fg); }
  }

  .bookmark-item.flash .item-url { animation: flash 0.6s ease; }

  @keyframes spin-cw {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .btn-copy.copied {
    animation: spin-cw 0.4s ease;
    color: var(--fg);
  }

  #add-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 3px 0;
    margin-top: 4px;
    display: block;
  }

  #add-btn:hover { color: var(--fg); }

  .inline-form {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid var(--line);
  }

  .inline-form input {
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    outline: none;
    padding: 1px 0;
  }

  .inline-form .f-url { flex: 1; }
  .inline-form .f-tag { width: 80px; }

  .inline-form button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    white-space: nowrap;
  }

  .inline-form button:hover { color: var(--fg); }

  .empty { color: var(--dim); padding: 6px 0; }

  .bookmark-item.selected .item-url { color: var(--fg); }
  .bookmark-item.selected { background: var(--line); }

  #drag-rect {
    position: fixed;
    border: 1px solid var(--dim);
    background: rgba(150,150,150,0.08);
    pointer-events: none;
    display: none;
    z-index: 999;
  }

  .fetching { opacity: 0.4; }
</style>
</head>
<body>

<header>
  <h1>INTERNET.COM</h1>
  <button id="theme-toggle">●</button>
</header>

<div class="search-bar">
  <span class="prompt">&gt;</span>
  <input type="text" id="search" placeholder="search..." autocomplete="new-password" name="search-field">
</div>

<div id="tag-filters"></div>

<ul id="bookmark-list"></ul>
<button id="add-btn">+</button>
<div id="drag-rect"></div>

<script>
const DEFAULTS = [
  { id: 1, url: 'autocatalogarchive.com' },
  { id: 2, url: 'fmhy.net' },
  { id: 3, url: 'emojipedia.org' },
  { id: 4, url: 'www.imcdb.org' },
  { id: 5, url: 'www.iloveimg.com' },
  { id: 6, url: 'www.ilovepdf.com/fr' },
];

const OLD_URLS = ['github.com', 'mdn.dev', 'lobste.rs'];
const stored = JSON.parse(localStorage.getItem('bookmarks') || 'null');
const isOldData = stored && stored.every(b => OLD_URLS.includes(b.url));
if (!stored || isOldData) localStorage.removeItem('bookmarks');
let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || 'null') ?? DEFAULTS;
let query = '';
let activeTag = null;

const save = () => localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
const list = document.getElementById('bookmark-list');
const search = document.getElementById('search');
const addBtn = document.getElementById('add-btn');
const tagFilters = document.getElementById('tag-filters');

let hoveredId = null, hoveredLi = null;

async function fetchMeta(url) {
  try {
    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(href(url))}`);
    const json = await res.json();
    if (json.status === 'success') {
      const d = json.data;
      return { title: d.title || '', desc: d.description || '', tag: guessTag(url, d) };
    }
  } catch {}
  return {};
}

function guessTag(url, data) {
  const text = (url + ' ' + (data.title || '') + ' ' + (data.description || '')).toLowerCase();
  if (/github|gitlab|stackoverflow|codepen|npm|vercel|netlify|dev\.to|replit/.test(text)) return 'dev';
  if (/youtube|vimeo|twitch|dailymotion/.test(text)) return 'video';
  if (/figma|dribbble|behance|awwwards|design|ui|ux/.test(text)) return 'design';
  if (/news|hacker|lobster|reddit|twitter|x\.com|medium|substack/.test(text)) return 'news';
  if (/amazon|ebay|etsy|shop|store/.test(text)) return 'shopping';
  if (/spotify|soundcloud|deezer|music/.test(text)) return 'music';
  if (/docs|documentation|reference|mdn|wiki/.test(text)) return 'ref';
  if (/tool|convert|compress|edit|generator|calc/.test(text)) return 'outil';
  if (/photo|image|img|unsplash|pexels/.test(text)) return 'image';
  if (/ai|gpt|claude|openai|llm|model/.test(text)) return 'ai';
  return null;
}

function copyBM(id, li) {
  const b = bookmarks.find(x => x.id === id);
  if (!b) return;
  navigator.clipboard.writeText(href(b.url));
  const btn = li.querySelector('.btn-copy');
  btn.classList.remove('copied');
  void btn.offsetWidth;
  btn.classList.add('copied');
  btn.addEventListener('animationend', () => btn.classList.remove('copied'), { once: true });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function href(url) {
  return url.startsWith('http') ? url : 'https://' + url;
}

function renderTags() {
  const tags = [...new Set(bookmarks.map(b => b.tag).filter(Boolean))];
  tagFilters.innerHTML = '';
  if (!tags.length) return;
  tags.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (activeTag === t ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => { activeTag = activeTag === t ? null : t; renderTags(); render(); };
    tagFilters.appendChild(btn);
  });
}

function render() {
  const q = query.toLowerCase();
  const filtered = bookmarks.filter(b => {
    const matchTag = !activeTag || b.tag === activeTag;
    const matchQ = !q || [b.url, b.tag, b.title, b.desc].filter(Boolean).some(v => v.toLowerCase().includes(q));
    return matchTag && matchQ;
  });

  list.innerHTML = '';

  if (!filtered.length) {
    const li = document.createElement('li');
    li.className = 'empty';
    li.textContent = 'aucun résultat';
    list.appendChild(li);
    return;
  }

  filtered.forEach(b => {
    const li = document.createElement('li');
    li.className = 'bookmark-item';
    li.dataset.id = b.id;
    li.innerHTML = `
      <span class="item-text">
        <span class="item-url">${esc(b.url)}</span>${b.tag ? `<span class="item-tag">${esc(b.tag)}</span>` : ''}
      </span>
      <span class="item-actions">
        <button class="btn-copy" data-id="${b.id}">c</button>
        <button class="btn-edit" data-id="${b.id}">e</button>
        <button class="btn-del" data-id="${b.id}">x</button>
      </span>
    `;
    li.querySelector('.item-url').onclick = () => window.open(href(b.url), '_blank');
    li.querySelector('.btn-copy').onclick = e => { e.stopPropagation(); copyBM(b.id, li); };
    li.querySelector('.btn-edit').onclick = e => { e.stopPropagation(); startEdit(b.id, li); };
    li.querySelector('.btn-del').onclick = e => { e.stopPropagation(); deleteBM(b.id); };
    li.addEventListener('mouseenter', () => { hoveredId = b.id; hoveredLi = li; });
    li.addEventListener('mouseleave', () => { hoveredId = null; hoveredLi = null; });
    list.appendChild(li);
  });
}

function startEdit(id, li) {
  const b = bookmarks.find(x => x.id === id);
  if (!b) return;

  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input class="f-url" value="${esc(b.url)}" placeholder="url">
    <input class="f-tag" value="${esc(b.tag || '')}" placeholder="tag">
  `;

  const saveEdit = () => {
    b.url = form.querySelector('.f-url').value.trim();
    b.tag = form.querySelector('.f-tag').value.trim();
    if (!b.url) return;
    save(); renderTags(); render();
  };

  form.querySelectorAll('input').forEach(inp => {
    inp.onkeydown = e => {
      if (e.key === 'Enter') saveEdit();
      if (e.key === 'Escape') render();
    };
  });

  li.replaceWith(form);
  const inp = form.querySelector('.f-url');
  inp.focus();
  inp.setSelectionRange(inp.value.length, inp.value.length);
}

function deleteBM(id) {
  bookmarks = bookmarks.filter(b => b.id !== id);
  save(); renderTags(); render();
}

async function addUrl(url) {
  const id = Date.now();
  const bm = { id, url };
  bookmarks.push(bm);
  save(); renderTags(); render();
  const meta = await fetchMeta(url);
  if (meta.title || meta.desc || meta.tag) {
    bm.title = meta.title;
    bm.desc = meta.desc;
    if (meta.tag) bm.tag = meta.tag;
    save(); renderTags(); render();
  }
}

addBtn.onclick = () => {
  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input class="f-url" placeholder="url">
    <input class="f-tag" placeholder="tag">
  `;

  const saveAdd = async () => {
    const url = form.querySelector('.f-url').value.trim();
    const tag = form.querySelector('.f-tag').value.trim();
    if (!url) { form.querySelector('.f-url').focus(); return; }
    form.remove();
    const id = Date.now();
    const bm = { id, url, tag };
    bookmarks.push(bm);
    save(); renderTags(); render();
    const meta = await fetchMeta(url);
    if (meta.title || meta.desc || meta.tag) {
      bm.title = meta.title;
      bm.desc = meta.desc;
      if (!bm.tag && meta.tag) bm.tag = meta.tag;
      save(); renderTags(); render();
    }
  };

  form.querySelectorAll('input').forEach(inp => {
    inp.onkeydown = e => {
      if (e.key === 'Enter') saveAdd();
      if (e.key === 'Escape') form.remove();
    };
  });

  addBtn.before(form);
  form.querySelector('.f-url').focus();
};

search.oninput = () => { query = search.value; render(); };

// Drag selection
let selected = new Set();
let dragging = false, dragStart = null;
const dragRect = document.getElementById('drag-rect');

function clearSelection() {
  selected.clear();
  document.querySelectorAll('.bookmark-item.selected').forEach(el => el.classList.remove('selected'));
}

document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (e.target.closest('button, input, .inline-form')) return;
  if (document.activeElement && document.activeElement.tagName === 'INPUT') document.activeElement.blur();
  e.preventDefault();
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragRect.style.display = 'none';
  if (!e.shiftKey) clearSelection();
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;

  const x = Math.min(e.clientX, dragStart.x);
  const y = Math.min(e.clientY, dragStart.y);
  const w = Math.abs(dx), h = Math.abs(dy);

  dragRect.style.display = 'block';
  dragRect.style.left = x + 'px';
  dragRect.style.top = y + 'px';
  dragRect.style.width = w + 'px';
  dragRect.style.height = h + 'px';

  document.querySelectorAll('.bookmark-item').forEach(el => {
    const r = el.getBoundingClientRect();
    const hit = r.left < x+w && r.right > x && r.top < y+h && r.bottom > y;
    const id = parseInt(el.dataset.id);
    if (hit) { el.classList.add('selected'); selected.add(id); }
    else if (!e.shiftKey) { el.classList.remove('selected'); selected.delete(id); }
  });
});

document.addEventListener('mouseup', () => {
  dragging = false;
  dragRect.style.display = 'none';
});

function handlePasteUrl(url) {
  url = url.trim();
  if (!url) return;
  const existing = bookmarks.find(b => b.url === url || href(b.url) === url || b.url === url.replace(/^https?:\/\//, ''));
  if (existing) {
    const el = document.querySelector(`.bookmark-item[data-id="${existing.id}"]`);
    if (el) { el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    return;
  }
  addUrl(url);
}

document.addEventListener('paste', e => {
  if (document.activeElement.tagName === 'INPUT') return;
  const url = (e.clipboardData || window.clipboardData).getData('text');
  handlePasteUrl(url);
});

document.addEventListener('keydown', e => {
  if (document.activeElement.tagName === 'INPUT') return;
  const key = e.key.toLowerCase();

  if ((e.metaKey || e.ctrlKey) && key === 'v') {
    navigator.clipboard.readText().then(handlePasteUrl).catch(() => {});
    return;
  }

  if (hoveredId && hoveredLi) {
    if (key === 'x') { deleteBM(hoveredId); return; }
    if (key === 'c') { copyBM(hoveredId, hoveredLi); return; }
    if (key === 'e') { e.preventDefault(); const li = hoveredLi; startEdit(hoveredId, li); return; }
  }

  if ((e.key === 'Delete' || e.key === 'Backspace') && selected.size > 0) {
    bookmarks = bookmarks.filter(b => !selected.has(b.id));
    selected.clear();
    save(); renderTags(); render();
  }
});

// Theme
const toggle = document.getElementById('theme-toggle');
const faviconDark = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48Y2lyY2xlIGN4PSc1MCcgY3k9JzUwJyByPSc0MCcgZmlsbD0nbm9uZScgc3Ryb2tlPScjZmZmJyBzdHJva2Utd2lkdGg9JzEwJy8+PC9zdmc+';
const faviconLight = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48Y2lyY2xlIGN4PSc1MCcgY3k9JzUwJyByPSc0MCcgZmlsbD0nbm9uZScgc3Ryb2tlPScjMDAwJyBzdHJva2Utd2lkdGg9JzEwJy8+PC9zdmc+';
const faviconEl = document.querySelector('link[rel="icon"]');
const applyTheme = t => {
  document.body.classList.toggle('light', t === 'light');
  faviconEl.href = t === 'light' ? faviconLight : faviconDark;
};
applyTheme(localStorage.getItem('theme') || 'dark');
toggle.onclick = () => {
  const t = document.body.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('theme', t);
  applyTheme(t);
};

renderTags();
render();
</script>
</body>
</html>
