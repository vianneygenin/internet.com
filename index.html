<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERNET.COM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { user-select: none; }
  ::selection { background: transparent; }

  :root {
    --bg: #111;
    --fg: #eee;
    --dim: #666;
    --line: #333;
  }

  body.light {
    --bg: #fff;
    --fg: #111;
    --dim: #999;
    --line: #ddd;
  }

  body {
    font-family: monospace;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    line-height: 1.6;
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 16px 64px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 14px;
    font-weight: normal;
    letter-spacing: 0.05em;
  }

  #theme-toggle {
    background: none;
    border: none;
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .prompt { color: var(--dim); }

  #search {
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    outline: none;
    width: 100%;
    padding: 2px 0;
  }

  #search::placeholder { color: var(--dim); }

  #bookmark-list {
    list-style: none;
    user-select: none;
  }

  .bookmark-item {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 3px 0;
    cursor: default;
    border-bottom: 1px solid transparent;
  }

  .bookmark-item:hover {
    border-bottom-color: var(--line);
  }

  .item-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .item-url {
    color: var(--dim);
    cursor: pointer;
  }

  .item-url:hover { color: var(--fg); }
  .item-sep { color: var(--dim); margin: 0 6px; }
  .item-title { color: var(--fg); }
  .item-desc { color: var(--dim); }

  .item-actions {
    display: flex;
    gap: 14px;
    opacity: 0;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .bookmark-item:hover .item-actions { opacity: 1; }

  .item-actions button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }

  .item-actions button:hover { color: var(--fg); }

  @keyframes spin-cw {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .btn-copy.copied {
    animation: spin-cw 0.4s ease;
    color: var(--fg);
  }

  #add-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 3px 0;
    margin-top: 4px;
    display: block;
  }

  #add-btn:hover { color: var(--fg); }

  .inline-form {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid var(--line);
  }

  .inline-form input {
    background: none;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--fg);
    font-family: monospace;
    font-size: 14px;
    outline: none;
    padding: 1px 0;
  }

  .inline-form .f-url { flex: 1; }

  .inline-form button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    white-space: nowrap;
  }

  .inline-form button:hover { color: var(--fg); }

  .empty { color: var(--dim); padding: 6px 0; }

  .bookmark-item.selected .item-url { color: var(--fg); }
  .bookmark-item.selected { background: var(--line); }


  #drag-rect {
    position: fixed;
    border: 1px solid var(--dim);
    background: rgba(150,150,150,0.08);
    pointer-events: none;
    display: none;
    z-index: 999;
  }
</style>
</head>
<body>

<header>
  <h1>INTERNET.COM</h1>
  <button id="theme-toggle">●</button>
</header>

<div class="search-bar">
  <span class="prompt">&gt;</span>
  <input type="text" id="search" placeholder="search..." autocomplete="off">
</div>

<ul id="bookmark-list"></ul>
<button id="add-btn">+</button>
<div id="drag-rect"></div>

<script>
const DEFAULTS = [
  { id: 1, url: 'github.com' },
  { id: 2, url: 'mdn.dev' },
  { id: 3, url: 'lobste.rs' },
];

const VERSION = '2';
if (localStorage.getItem('bm_version') !== VERSION) {
  localStorage.removeItem('bookmarks');
  localStorage.setItem('bm_version', VERSION);
}
let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || 'null') ?? DEFAULTS;
let query = '';

const save = () => localStorage.setItem('bookmarks', JSON.stringify(bookmarks));

const list = document.getElementById('bookmark-list');
const search = document.getElementById('search');
const addBtn = document.getElementById('add-btn');

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function href(url) {
  return url.startsWith('http') ? url : 'https://' + url;
}

function render() {
  const q = query.toLowerCase();
  const filtered = bookmarks.filter(b =>
    !q || [b.url, b.title, b.desc].some(v => v.toLowerCase().includes(q))
  );

  list.innerHTML = '';

  if (!filtered.length) {
    const li = document.createElement('li');
    li.className = 'empty';
    li.textContent = 'aucun résultat';
    list.appendChild(li);
    return;
  }

  filtered.forEach(b => {
    const li = document.createElement('li');
    li.className = 'bookmark-item';
    li.dataset.id = b.id;
    li.innerHTML = `
      <span class="item-text">
        <span class="item-url">${esc(b.url)}</span>
      </span>
      <span class="item-actions">
        <button class="btn-copy" data-id="${b.id}">c</button>
        <button class="btn-edit" data-id="${b.id}">e</button>
        <button class="btn-del" data-id="${b.id}">x</button>
      </span>
    `;
    li.querySelector('.item-url').onclick = () => window.open(href(b.url), '_blank');
    li.querySelector('.btn-copy').onclick = e => { e.stopPropagation(); navigator.clipboard.writeText(href(b.url)); };
    li.querySelector('.btn-edit').onclick = e => { e.stopPropagation(); startEdit(b.id, li); };
    li.querySelector('.btn-del').onclick = e => { e.stopPropagation(); deleteBM(b.id); };
    list.appendChild(li);
  });
}

function startEdit(id, li) {
  const b = bookmarks.find(x => x.id === id);
  if (!b) return;

  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input class="f-url" value="${esc(b.url)}" placeholder="url">
    <button class="save-edit">↵</button>
  `;

  const saveEdit = () => {
    b.url = form.querySelector('.f-url').value.trim();
    if (!b.url) return;
    save(); render();
  };

  form.querySelector('.save-edit').onclick = saveEdit;
  form.querySelector('.f-url').onkeydown = e => {
    if (e.key === 'Enter') saveEdit();
    if (e.key === 'Escape') render();
  };

  li.replaceWith(form);
  form.querySelector('.f-url').focus();
}

function deleteBM(id) {
  bookmarks = bookmarks.filter(b => b.id !== id);
  save(); render();
}

addBtn.onclick = () => {
  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <input class="f-url" placeholder="url">
    <button class="save-add">↵</button>
  `;

  const saveAdd = () => {
    const url = form.querySelector('.f-url').value.trim();
    if (!url) { form.querySelector('.f-url').focus(); return; }
    bookmarks.push({ id: Date.now(), url });
    save(); render();
  };

  form.querySelector('.save-add').onclick = saveAdd;
  form.querySelector('.f-url').onkeydown = e => {
    if (e.key === 'Enter') saveAdd();
    if (e.key === 'Escape') form.remove();
  };

  addBtn.before(form);
  form.querySelector('.f-url').focus();
};

search.oninput = () => { query = search.value; render(); };

// Drag selection
let selected = new Set();
let dragging = false, dragStart = null;
const dragRect = document.getElementById('drag-rect');

function clearSelection() {
  selected.clear();
  document.querySelectorAll('.bookmark-item.selected').forEach(el => el.classList.remove('selected'));
}

function updateSelBar() {}

document.addEventListener('selectstart', e => e.preventDefault());

document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (e.target.closest('button, input, .inline-form')) return;
  if (document.activeElement && document.activeElement.tagName === 'INPUT') document.activeElement.blur();
  e.preventDefault();
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragRect.style.display = 'none';
  if (!e.shiftKey) clearSelection();
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;

  const x = Math.min(e.clientX, dragStart.x);
  const y = Math.min(e.clientY, dragStart.y);
  const w = Math.abs(dx), h = Math.abs(dy);

  dragRect.style.display = 'block';
  dragRect.style.left = x + 'px';
  dragRect.style.top = y + 'px';
  dragRect.style.width = w + 'px';
  dragRect.style.height = h + 'px';

  document.querySelectorAll('.bookmark-item').forEach(el => {
    const r = el.getBoundingClientRect();
    const hit = r.left < x+w && r.right > x && r.top < y+h && r.bottom > y;
    const id = parseInt(el.dataset.id);
    if (hit) { el.classList.add('selected'); selected.add(id); }
    else if (!e.shiftKey) { el.classList.remove('selected'); selected.delete(id); }
  });

  updateSelBar();
});

document.addEventListener('mouseup', () => {
  dragging = false;
  dragRect.style.display = 'none';
});

// Delete key
document.addEventListener('keydown', e => {
  if ((e.key === 'Delete' || e.key === 'Backspace') && selected.size > 0 && document.activeElement.tagName !== 'INPUT') {
    bookmarks = bookmarks.filter(b => !selected.has(b.id));
    selected.clear();
    save(); render();
  }
});

// Theme
const toggle = document.getElementById('theme-toggle');
const applyTheme = t => { document.body.classList.toggle('light', t === 'light'); };
applyTheme(localStorage.getItem('theme') || 'dark');
toggle.onclick = () => {
  const t = document.body.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('theme', t);
  applyTheme(t);
};

render();
</script>
</body>
</html>
