<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>internet.com</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #ffffff;
    color: #111111;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    padding: 24px 32px 0;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  #count {
    font-size: 13px;
    color: #888;
  }

  .toolbar {
    padding: 16px 32px;
    display: flex;
    gap: 8px;
  }

  #search {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }

  #search:focus { border-color: #aaa; }

  button {
    padding: 7px 14px;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    color: #111;
    transition: background .1s;
  }

  button:hover { background: #f5f5f5; }

  #btn-add {
    border-color: #111;
    background: #111;
    color: #fff;
    white-space: nowrap;
  }

  #btn-add:hover { background: #333; }

  .filters {
    padding: 0 32px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .filter-btn {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 20px;
  }

  .filter-btn.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }

  .grid {
    padding: 0 32px 48px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

  .card {
    border: 1px solid #e5e5e5;
    border-radius: 6px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-name a {
    font-size: 15px;
    font-weight: 600;
    color: #111;
    text-decoration: none;
  }

  .card-name a:hover { text-decoration: underline; }

  .card-url {
    font-size: 12px;
    color: #888;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-desc {
    font-size: 13px;
    color: #444;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .tag {
    font-size: 11px;
    background: #f0f0f0;
    border: 1px solid #e0e0e0;
    border-radius: 3px;
    padding: 2px 7px;
    color: #555;
    flex: 1;
  }

  .card-actions { display: flex; gap: 6px; }

  .btn-edit, .btn-del {
    padding: 3px 8px;
    font-size: 12px;
  }

  .btn-del { color: #c00; }
  .btn-del:hover { background: #fff0f0; border-color: #c00; }

  .empty {
    grid-column: 1 / -1;
    padding: 48px;
    text-align: center;
    color: #aaa;
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 8px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal h2 { font-size: 16px; font-weight: 600; }

  .field { display: flex; flex-direction: column; gap: 4px; }

  .field label { font-size: 12px; color: #666; font-weight: 500; }

  .field input, .field select, .field textarea {
    padding: 7px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: vertical;
  }

  .field input:focus, .field select:focus, .field textarea:focus { border-color: #aaa; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 4px;
  }

  #btn-save {
    border-color: #111;
    background: #111;
    color: #fff;
  }

  #btn-save:hover { background: #333; }
</style>
</head>
<body>

<header>
  <h1>internet.com</h1>
  <span id="count"></span>
</header>

<div class="toolbar">
  <input id="search" type="search" placeholder="Rechercher...">
  <button id="btn-add">+ Ajouter</button>
</div>

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Ajouter un site</h2>
    <div class="field">
      <label>Nom *</label>
      <input id="f-name" type="text" placeholder="GitHub">
    </div>
    <div class="field">
      <label>URL *</label>
      <input id="f-url" type="url" placeholder="https://github.com">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" rows="2" placeholder="Hébergement de code..."></textarea>
    </div>
    <div class="field">
      <label>Catégorie</label>
      <select id="f-cat"></select>
    </div>
    <div class="modal-actions">
      <button id="btn-cancel">Annuler</button>
      <button id="btn-save">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const CATS = ['Tech','Design','Dev','Actualités','Outils','Vidéo','Réseaux sociaux','Shopping','Musique','Autres'];

const DEFAULTS = [
  { id: 1, name: 'GitHub', url: 'https://github.com', desc: 'Hébergement de code et collaboration', cat: 'Dev', addedAt: '2024-01-01' },
  { id: 2, name: 'MDN Web Docs', url: 'https://developer.mozilla.org', desc: 'Documentation web officielle', cat: 'Dev', addedAt: '2024-01-02' },
  { id: 3, name: 'Hacker News', url: 'https://news.ycombinator.com', desc: 'Actualités tech et startups', cat: 'Actualités', addedAt: '2024-01-03' },
  { id: 4, name: 'Figma', url: 'https://figma.com', desc: 'Outil de design UI/UX collaboratif', cat: 'Design', addedAt: '2024-01-04' },
];

// State
let sites = JSON.parse(localStorage.getItem('sites') || 'null') ?? DEFAULTS;
let activeFilter = 'Tous';
let editId = null;

// Persist
const save = () => localStorage.setItem('sites', JSON.stringify(sites));

// DOM refs
const grid = document.getElementById('grid');
const filtersEl = document.getElementById('filters');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
const overlay = document.getElementById('overlay');
const fName = document.getElementById('f-name');
const fUrl = document.getElementById('f-url');
const fDesc = document.getElementById('f-desc');
const fCat = document.getElementById('f-cat');
const modalTitle = document.getElementById('modal-title');

// Populate category select
CATS.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  fCat.appendChild(o);
});

function getFiltered() {
  const q = searchEl.value.trim().toLowerCase();
  return sites.filter(s => {
    const matchCat = activeFilter === 'Tous' || s.cat === activeFilter;
    const matchSearch = !q || [s.name, s.url, s.desc].some(v => v.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
}

function renderFilters() {
  const cats = ['Tous', ...new Set(sites.map(s => s.cat))];
  filtersEl.innerHTML = '';
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (c === activeFilter ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => { activeFilter = c; renderFilters(); renderGrid(); };
    filtersEl.appendChild(btn);
  });
}

function renderGrid() {
  const list = getFiltered();
  countEl.textContent = `${sites.length} site${sites.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    grid.innerHTML = '<p class="empty">Aucun site trouvé.</p>';
    return;
  }

  grid.innerHTML = list.map(s => `
    <div class="card">
      <div class="card-name"><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a></div>
      <div class="card-url">${esc(s.url)}</div>
      <div class="card-desc">${esc(s.desc)}</div>
      <div class="card-footer">
        <span class="tag">${esc(s.cat)}</span>
        <div class="card-actions">
          <button class="btn-edit" onclick="openEdit(${s.id})">Modifier</button>
          <button class="btn-del" onclick="deleteSite(${s.id})">Supprimer</button>
        </div>
      </div>
    </div>
  `).join('');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() { renderFilters(); renderGrid(); }

// Modal
function openAdd() {
  editId = null;
  modalTitle.textContent = 'Ajouter un site';
  fName.value = fUrl.value = fDesc.value = '';
  fCat.value = CATS[0];
  overlay.classList.add('open');
  fName.focus();
}

function openEdit(id) {
  const s = sites.find(x => x.id === id);
  if (!s) return;
  editId = id;
  modalTitle.textContent = 'Modifier le site';
  fName.value = s.name;
  fUrl.value = s.url;
  fDesc.value = s.desc;
  fCat.value = s.cat;
  overlay.classList.add('open');
  fName.focus();
}

function closeModal() { overlay.classList.remove('open'); }

function saveSite() {
  const name = fName.value.trim();
  const url = fUrl.value.trim();
  if (!name || !url) { fName.focus(); return; }

  if (editId) {
    const s = sites.find(x => x.id === editId);
    s.name = name; s.url = url; s.desc = fDesc.value.trim(); s.cat = fCat.value;
  } else {
    sites.push({ id: Date.now(), name, url, desc: fDesc.value.trim(), cat: fCat.value, addedAt: new Date().toISOString().slice(0,10) });
  }

  save(); closeModal(); render();
}

function deleteSite(id) {
  if (!confirm('Supprimer ce site ?')) return;
  sites = sites.filter(s => s.id !== id);
  save(); render();
}

// Events
document.getElementById('btn-add').onclick = openAdd;
document.getElementById('btn-cancel').onclick = closeModal;
document.getElementById('btn-save').onclick = saveSite;
searchEl.oninput = renderGrid;
overlay.onclick = e => { if (e.target === overlay) closeModal(); };
document.onkeydown = e => { if (e.key === 'Escape') closeModal(); };

render();
</script>
</body>
</html>
